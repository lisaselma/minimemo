<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <span class="window-title">minimemo</span>
    <div class="toolbar-spacer"></div>
    <button id="new-note" title="New memo">+</button>
    <button id="settings-toggle" title="Color settings">i</button>
    <button id="close-note" title="Close memo">×</button>
  </div>
  <div id="settings-panel">
    <label class="field">
      Color:
      <input type="color" id="color-picker" title="Memo color" />
    </label>
    <label class="field">
      Transparency:
      <input type="range" id="opacity-slider" min="0.3" max="1" step="0.05" />
    </label>
  </div>
  <div id="note" contenteditable="true"></div>
  <script src="renderer.js"></script>
</body>
</html>
