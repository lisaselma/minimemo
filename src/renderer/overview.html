<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>minimemo – Overview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 13px;
      color: #333;
      background: #f5f5f5;
      padding: 12px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #444;
      margin: 0 0 10px 0;
    }
    .memo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .memo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #fff;
      border-radius: 6px;
      margin-bottom: 6px;
      border: 1px solid #e0e0e0;
    }
    .memo-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex: 1;
    }
    .memo-item input[type="checkbox"] {
      margin: 0;
    }
    .memo-id {
      color: #888;
      font-size: 11px;
    }
    .empty {
      color: #888;
      font-size: 12px;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>Memo overview</h1>
  <p class="empty" id="empty-msg">No memos yet.</p>
  <ul class="memo-list" id="memo-list"></ul>
  <script>
    const { ipcRenderer } = require('electron')
    const listEl = document.getElementById('memo-list')
    const emptyEl = document.getElementById('empty-msg')

    function render(memos) {
      listEl.innerHTML = ''
      if (!memos || memos.length === 0) {
        emptyEl.style.display = 'block'
        return
      }
      emptyEl.style.display = 'none'
      memos.forEach(({ id, visible }) => {
        const li = document.createElement('li')
        li.className = 'memo-item'
        const label = document.createElement('label')
        const cb = document.createElement('input')
        cb.type = 'checkbox'
        cb.checked = visible
        cb.addEventListener('change', () => {
          ipcRenderer.send('set-memo-visible', id, cb.checked)
        })
        label.appendChild(cb)
        label.appendChild(document.createTextNode('Show on desktop'))
        const span = document.createElement('span')
        span.className = 'memo-id'
        span.textContent = id.length > 24 ? id.slice(0, 24) + '…' : id
        li.appendChild(label)
        li.appendChild(span)
        listEl.appendChild(li)
      })
    }

    function refresh() {
      ipcRenderer.invoke('get-memo-windows').then(render)
    }

    refresh()
    ipcRenderer.on('memo-list-changed', refresh)
    window.addEventListener('focus', refresh)
  </script>
</body>
</html>
