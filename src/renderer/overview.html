<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; font-size: 13px; margin: 12px; padding: 0; }
    h2 { margin: 0 0 10px; font-size: 14px; color: #333; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 6px 8px; margin: 2px 0; border-radius: 4px; cursor: pointer; }
    li:hover { background: #eee; }
    .btn { margin-top: 10px; padding: 8px 12px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #555; }
  </style>
</head>
<body>
  <h2>Memos</h2>
  <ul id="list"></ul>
  <button class="btn" id="new-note">New memo</button>
  <script src="overview.js"></script>
</body>
</html>
